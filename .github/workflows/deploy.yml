name: Deploy para Hostinger
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 177.7.34.232 >> ~/.ssh/known_hosts
      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key root@177.7.34.232 "cd /var/www/html && git pull origin main"
